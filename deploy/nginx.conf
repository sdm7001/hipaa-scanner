server {
    listen 80;
    server_name hipaa.texmg.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hipaa.texmg.com;

    ssl_certificate     /etc/letsencrypt/live/hipaa.texmg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hipaa.texmg.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Frontend static files
    root /var/www/hipaa-scanner/frontend/dist;
    index index.html;

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
}
